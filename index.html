<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مجوهرات أندريا - Andria Jewelry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: url('https://www2.0zz0.com/2025/05/02/22/926848264.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
      position: relative;
    }

    /* طبقة داكنة شفافة */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      z-index: -1;
    }

    /* البروفايل مع هالة ذهبية */
    .profile-wrap {
      position: relative;
      margin-bottom: 25px;
    }

    .profile-wrap::before {
      content: '';
      position: absolute;
      top: -10px; left: -10px;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, #d4af37, transparent, #d4af37, transparent);
      animation: rotate 4s linear infinite;
      filter: blur(8px);
      opacity: 0.7;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    .profile-pic {
      width: 150px; height: 150px;
      border-radius: 50%;
      border: 4px solid #d4af37;
      object-fit: cover;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 30px rgba(212,175,55,0.5);
    }

    /* النصوص */
    .brand {
      font-size: 46px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      margin-bottom: 5px;
    }

    .gold-text {
      color: #d4af37;
      text-shadow: 0 0 20px rgba(212,175,55,0.6);
    }

    .subtitle {
      font-size: 20px;
      color: rgba(255,255,255,0.9);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      margin: 15px auto 30px;
    }

    /* الروابط الزجاجية */
    .links {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .glass-btn {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 22px;
      text-decoration: none;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .glass-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .glass-btn:hover::after {
      transform: translateX(100%);
    }

    .glass-btn:hover {
      background: rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.5);
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 20px rgba(212,175,55,0.2);
    }

    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(255,255,255,0.15);
      transition: all 0.3s;
    }

    .glass-btn:hover .btn-icon {
      background: rgba(212,175,55,0.3);
      transform: rotate(10deg) scale(1.1);
    }

    .btn-info { flex: 1; text-align: right; }
    .btn-title { font-weight: 700; font-size: 16px; display: block; }
    .btn-desc { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    /* فوتر */
    .footer-box {
      margin-top: 40px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 25px;
      padding: 18px 35px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .footer-box p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 6px; }
    .footer-box span {
      color: #d4af37;
      font-weight: 700;
      font-size: 16px;
      text-shadow: 0 0 15px rgba(212,175,55,0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* تأثير برق ذهبي */
    .sparkle {
      position: fixed;
      pointer-events: none;
      color: #d4af37;
      font-size: 14px;
      animation: sparkleAnim 4s infinite;
      opacity: 0;
    }

    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(180deg); }
      100% { opacity: 0; transform: scale(0) rotate(360deg); }
    }

    @media (max-width: 480px) {
      .brand { font-size: 36px; }
      .profile-pic { width: 130px; height: 130px; }
    }
  </style>
</head>
